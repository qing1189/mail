# MS Mail Reg Tool — docker-compose
#
# 用法:
#   cp .env.example .env                      # 第一次:按需改 .env
#   docker compose up -d                      # 启动 Web 控制台 (默认)
#   docker compose --profile cli run --rm cli # 跑一次交互式 CLI
#   docker compose down                       # 停止
#   docker compose logs -f web                # 看实时日志
#
# 持久化数据全部落到 ./data/ 目录:
#   ./data/config.json    配置 (首次启动会自动生成)
#   ./data/proxies.txt    代理列表
#   ./data/Results/       注册结果
#   ./data/Profiles/      浏览器临时 profile
#
# 所有可调参数都在 .env 文件里,变量未设置时使用 ${VAR:-default} 兜底。

x-build: &build
  context: .
  dockerfile: Dockerfile

x-common: &common
  build: *build
  image: ${IMAGE_TAG:-ms-mail-reg-tool:latest}
  shm_size: ${SHM_SIZE:-1gb}
  volumes:
    - ./data:/data
  environment:
    - TZ=${TZ:-Asia/Shanghai}
    - MAIL_DATA_DIR=${MAIL_DATA_DIR:-/data}
    - MOZ_HEADLESS=${MOZ_HEADLESS:-1}
    - WEB_PORT=${WEB_PORT:-8787}
    - DEFAULT_HEADLESS=${DEFAULT_HEADLESS:-true}
    - DEFAULT_BROWSER_PATH=${DEFAULT_BROWSER_PATH:-/usr/bin/firefox-esr}
    - DEFAULT_PROFILE_ROOT=${DEFAULT_PROFILE_ROOT:-Profiles}

services:
  web:
    <<: *common
    container_name: ${CONTAINER_NAME_WEB:-ms-mail-web}
    ports:
      - "${HOST_PORT:-8787}:${WEB_PORT:-8787}"
    restart: ${RESTART_POLICY:-unless-stopped}
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:${WEB_PORT:-8787}/api/auth/status', timeout=5).read()\""
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cli:
    <<: *common
    container_name: ${CONTAINER_NAME_CLI:-ms-mail-cli}
    profiles: ["cli"]
    stdin_open: true
    tty: true
    command: ["python", "main.py"]
